# RiftbornAI Claude API Configuration
# Get your API key from: https://console.anthropic.com/settings/keys

APIKey=YOUR_API_KEY_HERE

# Model to use (configured in DefaultRiftbornAI.ini → ClaudeModel setting)
# Options: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001
Model=claude-opus-4-6

# Max tokens per response (default: 4096)
MaxTokens=4096
