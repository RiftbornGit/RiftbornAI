[/Script/RiftbornAI.RiftbornSettings]
; ==========================================================================
; RiftbornAI Configuration
; ==========================================================================
; This file is auto-generated. Edit via Project Settings > Plugins > RiftbornAI

; --- Bridge Settings ---
BridgePort=8765
ConnectionTimeoutSeconds=30.0
CommandTimeoutSeconds=60.0
MaxPoolConnections=4
MinPoolConnections=1
bAutoStartBridge=True

; --- AI Provider Settings ---
; Options: Anthropic, OpenAI, Gemini, Local
DefaultProvider=Local

; Claude model - Options: ClaudeOpus4, ClaudeSonnet4, ClaudeHaiku
ClaudeModel=ClaudeOpus4

; API Keys - Use environment variables! Never commit keys to git.
; Set ANTHROPIC_API_KEY, OPENAI_API_KEY, or GOOGLE_API_KEY environment variables
AnthropicApiKey=
OpenAIApiKey=
; GeminiApiKey=

; OpenAI Model - Options: gpt-5.4, gpt-5.2, gpt-5-mini, gpt-5-nano, gpt-4.1, gpt-4.1-mini, gpt-4.1-nano, gpt-4o, gpt-4o-mini, o4-mini
OpenAIModel=gpt-5.4

; Local (Ollama) Settings
OllamaEndpoint=http://127.0.0.1:11434
OllamaModel=minimax-m2.5:cloud

; Generation Settings
MaxResponseTokens=16384
MaxTokensPerRequest=16384
Temperature=0.7

; --- Rate Limiting ---
bEnableRateLimiting=True
RequestsPerMinute=0
bEnableCircuitBreaker=True
CircuitBreakerThreshold=5
CircuitBreakerCooldown=60.0

; --- Snapshot & Recovery ---
SnapshotDirectory=RiftbornAI/Snapshots
SnapshotRetentionDays=7
MaxSnapshotSizeMB=100
bAutoSnapshot=True

; --- Logging ---
; Options: Debug, Info, Warn, Error
LogLevel=Info
LogRetentionDays=7
bMirrorToUELog=True
LogDirectory=RiftbornAI
HealthCheckIntervalSeconds=30.0

; --- Security ---
; Auth disabled for local dev — re-enable for production
[RiftbornAI.Security]
AuthEnabled=False

bEnableSandbox=True
PythonExecutionTimeoutSeconds=30.0
; AdditionalBlockedModules=custom_module1,custom_module2
bSandboxAllowFileRead=True

; --- UI ---
bShowHealthIndicator=True
bShowMetricsInStatusBar=False
DefaultWindowWidth=800
DefaultWindowHeight=600
