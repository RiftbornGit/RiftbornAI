[FilterPlugin]
; Additional files packaged with the plugin by UAT BuildPlugin.
; Paths are relative to the plugin root. Wildcards: "..." (recursive), "*", "?".
;
; UE already ships Source/, Config/, Content/, Resources/, Shaders/, and the
; .uplugin by default. Everything below is non-standard and must be listed
; here or it will not reach customers.
;
; Rule of thumb: only list paths that the C++ runtime actually reads, or that
; the Python bridge services need to run. Dev-only tooling (tests, CI, linters,
; build scripts) is excluded — this file intentionally does NOT list them.
; The authoritative ship boundary is docs/CORE_PRODUCT_CONTRACT.md Section 6.5.

; =============================================================================
; Config — plugin settings, codegen templates, governance rules
; =============================================================================
; UE BuildPlugin does NOT auto-ship the plugin's Config/ directory; it must
; be listed explicitly. Empirically verified by a BuildPlugin dry-run:
; without this block, DefaultRiftbornAI.ini / CppClassTemplates.json /
; InferenceRules.json / GameDesignPresets.json / ue_knowledge.md are all
; absent from the packaged output and the plugin loads with no defaults.
/Config/...

; =============================================================================
; Bridge — Python governance kernel, tool contracts, and runtime services
; =============================================================================
; The C++ editor module reads JSON and spawns Python scripts from Bridge/ at
; runtime. These paths are all referenced from Source/RiftbornAI/**/*.cpp.

; Tool contract + public surface — loaded by ToolContract.cpp at init
/Bridge/toolbook/contracts.json
/Bridge/toolbook/public_surface.json
/Bridge/toolbook/__init__.py

/Bridge/plan_arbiter.py
/Bridge/client.py
/Bridge/riftborn_config.py
/Bridge/rollback_proof.py
/Bridge/py.typed

; Core Python runtime modules (imported by the services above)
/Bridge/core/...
/Bridge/governance/...
/Bridge/kernel/...
/Bridge/proof/...
/Bridge/repair/...

; Note: Bridge/audit_dashboard.html is referenced by BridgeRouteProof_Snapshots.cpp
; but the file does not currently exist in the repo (pre-existing broken reference).
; Add /Bridge/audit_dashboard.html here once the file is created.

; =============================================================================
; riftborn — Python SDK package (imported by Bridge services and the MCP server)
; =============================================================================
/riftborn/...

; =============================================================================
; MCP server — how external AI clients drive the plugin
; =============================================================================
; Ship the TypeScript sources and package manifest. node_modules/ and dist/ are
; gitignored so they won't be in the source tree seen by BuildPlugin.
/mcp-server/src/...
/mcp-server/package.json
/mcp-server/tsconfig.json
/mcp-server/README.md

; =============================================================================
; Python package manifest so customers can pip install the bundled SDK
; =============================================================================
/pyproject.toml
/requirements.lock

; =============================================================================
; Customer-facing top-level docs
; =============================================================================
/CHANGELOG.md
/EULA.md
/LICENSE
/docs/README.md
/docs/GETTING_STARTED.md
