<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiftbornAI Copilot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1d21;
            --bg2: #22262c;
            --bg3: #2a2f36;
            --text: #e8e8e8;
            --text2: #a0a0a0;
            --accent: #4fc3f7;
            --accent2: #81c784;
            --user: #5c6bc0;
            --error: #ef5350;
            --border: #3a3f46;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }
        
        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #1a1d21;
            font-size: 14px;
        }
        
        .title { font-weight: 600; }
        
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text2);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text2);
        }
        
        .status-dot.online { background: var(--accent2); }
        .status-dot.offline { background: var(--error); }
        
        select {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        
        select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
        
        button {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        button:hover { background: var(--border); }
        button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Chat area */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .message.user {
            align-self: flex-end;
            background: var(--user);
            border-bottom-right-radius: 4px;
        }
        
        .message.ai {
            align-self: flex-start;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .message.error {
            background: rgba(239, 83, 80, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
        }
        
        .message pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            margin: 8px 0;
            overflow-x: auto;
            font-family: var(--mono);
            font-size: 13px;
        }
        
        .message code {
            font-family: var(--mono);
            background: rgba(79, 195, 247, 0.15);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 13px;
        }
        
        .message pre code {
            background: none;
            padding: 0;
        }
        
        .message p { margin: 6px 0; }
        .message p:first-child { margin-top: 0; }
        .message p:last-child { margin-bottom: 0; }
        .message ul, .message ol { margin: 6px 0 6px 20px; }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            align-self: flex-start;
            width: fit-content;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text2);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .metrics {
            font-size: 11px;
            color: var(--text2);
            margin-top: 6px;
            font-family: var(--mono);
        }
        
        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
        }
        
        .input-row {
            display: flex;
            gap: 10px;
        }
        
        textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            resize: none;
            min-height: 48px;
            max-height: 150px;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .send-btn {
            background: var(--accent);
            color: #1a1d21;
            font-weight: 600;
            min-width: 80px;
        }
        
        .send-btn:hover { background: #29b6f6; }
        .send-btn:disabled { background: var(--border); color: var(--text2); }
        
        .hint {
            font-size: 11px;
            color: var(--text2);
            margin-top: 8px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4f56; }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="brand">
                <div class="logo">R</div>
                <span class="title">RiftbornAI Copilot</span>
            </div>
            <div class="controls">
                <div class="status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </div>
                <select id="modelSelect" title="Select model"></select>
                <button id="clearBtn">Clear</button>
            </div>
        </header>
        
        <div class="chat" id="chat"></div>
        
        <div class="input-area">
            <div class="input-row">
                <textarea id="input" placeholder="Ask about Unreal Engine, C++, Blueprints..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
            <div class="hint">Enter to send • Shift+Enter for new line</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script>
        const OLLAMA_URL = 'http://localhost:11434';
        
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const modelSelect = document.getElementById('modelSelect');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        let history = [];
        let isProcessing = false;
        
        // Configure marked
        marked.setOptions({ breaks: true, gfm: true });
        
        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 150) + 'px';
        });
        
        // Enter to send
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
        
        sendBtn.addEventListener('click', send);
        clearBtn.addEventListener('click', () => {
            history = [];
            chat.innerHTML = '';
        });
        
        // Load models
        async function loadModels() {
            try {
                const res = await fetch(OLLAMA_URL + '/api/tags');
                if (!res.ok) throw new Error('Failed');
                
                const data = await res.json();
                modelSelect.innerHTML = '';
                
                for (const m of (data.models || [])) {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    modelSelect.appendChild(opt);
                }
                
                setStatus('online', 'Connected');
            } catch (e) {
                setStatus('offline', 'Ollama offline');
            }
        }
        
        function setStatus(state, text) {
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = text;
        }
        
        function addMessage(role, content, metrics) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            
            if (role === 'ai') {
                div.innerHTML = marked.parse(content);
            } else {
                div.textContent = content;
            }
            
            if (metrics) {
                const m = document.createElement('div');
                m.className = 'metrics';
                m.textContent = `${metrics.tokens} tokens • ${metrics.tps} t/s • ${metrics.time}ms`;
                div.appendChild(m);
            }
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typing')?.remove();
        }
        
        async function send() {
            const text = input.value.trim();
            if (!text || isProcessing) return;
            
            isProcessing = true;
            sendBtn.disabled = true;
            input.value = '';
            input.style.height = 'auto';
            
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            
            showTyping();
            const startTime = performance.now();
            
            try {
                const res = await fetch(OLLAMA_URL + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: history,
                        stream: true
                    })
                });
                
                if (!res.ok) throw new Error('HTTP ' + res.status);
                
                hideTyping();
                const msgEl = addMessage('ai', '');
                let fullContent = '';
                let tokenCount = 0;
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line);
                            if (data.message?.content) {
                                fullContent += data.message.content;
                                msgEl.innerHTML = marked.parse(fullContent);
                                chat.scrollTop = chat.scrollHeight;
                            }
                            if (data.eval_count) tokenCount = data.eval_count;
                        } catch {}
                    }
                }
                
                const elapsed = Math.round(performance.now() - startTime);
                const tps = tokenCount > 0 ? (tokenCount / (elapsed / 1000)).toFixed(1) : '?';
                
                // Add metrics
                const m = document.createElement('div');
                m.className = 'metrics';
                m.textContent = `${tokenCount || '?'} tokens • ${tps} t/s • ${elapsed}ms`;
                msgEl.appendChild(m);
                
                history.push({ role: 'assistant', content: fullContent });
                
            } catch (e) {
                hideTyping();
                addMessage('error', 'Error: ' + e.message);
            }
            
            isProcessing = false;
            sendBtn.disabled = false;
            input.focus();
        }
        
        loadModels();
    </script>
</body>
</html>
